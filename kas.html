<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Import Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base Setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #f0f4f8; /* Soft blue-gray background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    /* Card Container */
    .container { 
      width: 100%;
      max-width: 420px; 
      background: #ffffff; 
      padding: 30px 25px; 
      border-radius: 24px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
    }

    /* Header */
    h2 { 
      text-align: center; 
      color: #1e293b; 
      margin-bottom: 5px;
      font-weight: 700;
      font-size: 24px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 25px;
    }
    
    /* Tabs (Segmented Control) */
    .tabs { 
      display: flex; 
      background: #f1f5f9; 
      border-radius: 16px; 
      padding: 6px; 
      margin-bottom: 25px; 
    }
    .tab-btn { 
      flex: 1; 
      padding: 12px; 
      border: none; 
      border-radius: 12px;
      cursor: pointer; 
      font-weight: 600; 
      background: transparent; 
      color: #64748b; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }
    /* Tab Active States */
    .tab-btn.active-debet { 
      background: #10b981; /* Emerald Green */
      color: white; 
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .tab-btn.active-kredit { 
      background: #ef4444; /* Rose Red */
      color: white; 
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    /* Form Inputs */
    .form-group { margin-bottom: 18px; }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 600; 
      color: #334155;
      font-size: 14px;
    }
    input[type="text"], input[type="number"], select { 
      width: 100%; 
      padding: 14px 16px; 
      background: #f8fafc;
      border: 2px solid transparent; 
      border-radius: 14px; 
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: #0f172a;
      transition: all 0.2s; 
    }
    /* Focus State Gen Z style (Glow & Border) */
    input:focus, select:focus {
      outline: none;
      background: #ffffff;
    }
    .focus-debet input:focus, .focus-debet select:focus {
      border-color: #34d399;
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
    }
    .focus-kredit input:focus, .focus-kredit select:focus {
      border-color: #fb7185;
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.1);
    }
    
    /* Submit Button */
    .submit-btn { 
      width: 100%; 
      padding: 16px; 
      color: white; 
      border: none; 
      border-radius: 16px; 
      cursor: pointer; 
      font-size: 15px; 
      font-weight: 700; 
      margin-top: 10px; 
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .submit-debet { background-color: #10b981; }
    .submit-debet:hover { background-color: #059669; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2); }
    
    .submit-kredit { background-color: #ef4444; }
    .submit-kredit:hover { background-color: #dc2626; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(239, 68, 68, 0.2); }
    
    .submit-btn:active { transform: translateY(1px); } /* Bouncy click effect */
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    
    /* Message Notification */
    #message { 
      margin-top: 20px; 
      text-align: center; 
      font-weight: 600;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      display: none; /* hidden by default */
    }
    .msg-success { background: #dcfce7; color: #166534; display: block !important; }
    .msg-error { background: #fee2e2; color: #991b1b; display: block !important; }

  </style>
</head>
<body id="bodyTheme" class="focus-debet">
  <div class="container">
    <h2>💸 Tracker Kas</h2>
    <div class="subtitle">Catat uang masuk & keluar gampang banget.</div>

    <!-- Tabs Pemasukan & Pengeluaran -->
    <div class="tabs">
      <button type="button" class="tab-btn active-debet" id="tabDebet" onclick="setTab('debet')">Masuk 📈</button>
      <button type="button" class="tab-btn" id="tabKredit" onclick="setTab('kredit')">Keluar 📉</button>
    </div>

    <form id="kasForm" onsubmit="event.preventDefault(); submitForm();">
      
      <div class="form-group">
        <label for="keterangan">📝 Buat apa / Dari mana?</label>
        <input type="text" id="keterangan" name="keterangan" required autocomplete="off" placeholder="Contoh: Beli Kopi, Gaji, dll">
      </div>

      <div class="form-group">
        <label for="bulan">🗓️ Bulan</label>
        <select id="bulan" name="bulan" required>
          <option value="" disabled selected>Pilih bulan dulu...</option>
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>

      <div class="form-group">
        <label id="labelNominal" for="nominal">💰 Berapa duit? (Rp)</label>
        <input type="number" id="nominal" name="nominal" min="0" required placeholder="0">
      </div>

      <button type="submit" id="btnSubmit" class="submit-btn submit-debet">Simpan Pemasukkan</button>
    </form>
    
    <div id="message"></div>
  </div>

  <script>
    var jenisTransaksi = 'debet';

    function setTab(jenis) {
      jenisTransaksi = jenis;
      var tabDebet = document.getElementById('tabDebet');
      var tabKredit = document.getElementById('tabKredit');
      var btnSubmit = document.getElementById('btnSubmit');
      var bodyTheme = document.getElementById('bodyTheme');

      if(jenis === 'debet') {
        // Mode Masuk (Hijau)
        tabDebet.classList.add('active-debet');
        tabKredit.classList.remove('active-kredit');
        btnSubmit.className = 'submit-btn submit-debet';
        btnSubmit.innerText = '✨ Simpan Pemasukkan';
        bodyTheme.className = 'focus-debet';
      } else {
        // Mode Keluar (Merah)
        tabKredit.classList.add('active-kredit');
        tabDebet.classList.remove('active-debet');
        btnSubmit.className = 'submit-btn submit-kredit';
        btnSubmit.innerText = '💸 Simpan Pengeluaran';
        bodyTheme.className = 'focus-kredit';
      }
    }

    function submitForm() {
  var btn = document.getElementById('btnSubmit');
  var msgBox = document.getElementById('message');
  
  btn.disabled = true;
  btn.innerText = 'Loading bentar... ⏳';
  msgBox.className = '';
  msgBox.innerText = '';

  var form = document.getElementById('kasForm');
  var nominalInput = parseFloat(form.nominal.value) || 0;

  // Data yang disiapkan sama persis
  var dataPayload = {
    keterangan: form.keterangan.value,
    bulan: form.bulan.value,
    debet: (jenisTransaksi === 'debet') ? nominalInput : 0,
    kredit: (jenisTransaksi === 'kredit') ? nominalInput : 0
  };

  // GANTI URL DI BAWAH DENGAN LINK WEB APP GAS KAMU YANG BARU
  var webAppUrl = "https://script.google.com/macros/s/AKfycby6gNBDX9fG4e7KgRFuVhzQMKt5qtsg5w6OcToOhBZbh5sjpS1jYXWH4tQMTbTKSEbX/exec";

  // Menggunakan Fetch API untuk mengirim data ke GAS
  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify(dataPayload)
  })
  .then(response => response.json())
  .then(result => {
    // Menangani jawaban dari GAS
    if(result.status === "error" || result.message.includes("Error")) {
      msgBox.className = 'msg-error';
      msgBox.innerText = result.message;
    } else {
      msgBox.className = 'msg-success';
      msgBox.innerText = 'Done! Data udah masuk ✅';
      form.reset();
    }
    
    btn.disabled = false;
    btn.innerText = (jenisTransaksi === 'debet') ? '✨ Simpan Pemasukkan' : '💸 Simpan Pengeluaran';
    
    setTimeout(function(){ 
      msgBox.className = ''; 
      msgBox.innerText = ''; 
    }, 3500);
  })
  .catch(error => {
    // Jika koneksi putus atau gagal
    msgBox.className = 'msg-error';
    msgBox.innerText = "Gagal kirim data: " + error.message;
    btn.disabled = false;
    btn.innerText = 'Coba Lagi';
  });
}
  </script>
</body>
</html>
