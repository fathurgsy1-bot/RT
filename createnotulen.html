<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SI-WARGA Notulen Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f101c;
      --card-bg: #1a1a2e;
      --card-border: #292942;
      --primary: #9b72ff;
      --primary-hover: #8356f5;
      --text-main: #ffffff;
      --text-muted: #8b8d9c;
      --glow: rgba(155, 114, 255, 0.4);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 20%, #1e1936 0%, transparent 50%);
      min-height: 100vh; 
      padding: 20px; 
      display: flex; 
      justify-content: center;
      align-items: flex-start; 
      color: var(--text-main);
    }

    .container {
      width: 100%; 
      max-width: 800px; 
      padding: 20px 10px;
    }

    /* Navbar / Header */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #a884ff 0%, #7e4efc 100%);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 20px;
      color: white;
      box-shadow: 0 0 20px var(--glow);
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .logo-text span { color: var(--primary); }

    /* Title Area */
    .title-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(155, 114, 255, 0.1);
      border: 1px solid rgba(155, 114, 255, 0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: #d2c4ff;
      margin-bottom: 20px;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--primary);
    }

    .title-area h1 { 
      font-size: 36px; 
      font-weight: 800; 
      line-height: 1.2;
    }
    .title-area h1 .highlight {
      color: #a685ff;
      text-shadow: 0 0 25px rgba(166, 133, 255, 0.4);
    }

    /* Form Layout */
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .form-group { 
      flex: 1; 
      margin-bottom: 24px; 
    }
    .form-row .form-group { margin-bottom: 0; }
    
    .form-group label { 
      display: block; 
      font-size: 13px; 
      font-weight: 600; 
      margin-bottom: 8px; 
      color: var(--text-muted); 
    }

    /* Inputs & Selects styled like cards */
    .input-control {
      width: 100%; 
      padding: 16px 20px; 
      border-radius: 16px; 
      border: 1px solid var(--card-border);
      font-size: 15px; 
      font-weight: 600;
      outline: none; 
      transition: all 0.2s;
      background-color: var(--card-bg);
      color: var(--text-main);
      appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b8d9c%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat, repeat;
      background-position: right .7em top 50%, 0 0;
      background-size: .65em auto, 100%;
    }
    .input-control:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px rgba(155, 114, 255, 0.15); 
    }
    .input-control option {
      background-color: var(--card-bg);
      color: var(--text-main);
    }
    
    /* Word Editor Wrapper */
    .word-container {
      background: var(--card-bg); 
      border: 1px solid var(--card-border); 
      border-radius: 16px;
      overflow: hidden; 
      transition: border-color 0.2s;
    }
    .word-container:focus-within { border-color: var(--primary); }
    
    /* Toolbar */
    .toolbar {
      background: rgba(0,0,0,0.2); 
      padding: 12px; 
      border-bottom: 1px solid var(--card-border);
      display: flex; 
      flex-wrap: wrap; 
      gap: 6px; 
      align-items: center;
    }
    .toolbar-btn {
      background: transparent; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 8px;
      cursor: pointer; 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--text-muted);
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.1s;
    }
    .toolbar-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    .toolbar-separator { width: 1px; height: 20px; background: var(--card-border); margin: 0 4px; }
    
    /* Editor Paper Area */
    .editor-area {
      min-height: 300px; 
      max-height: 500px; 
      padding: 24px; 
      overflow-y: auto;
      outline: none; 
      font-size: 15px; 
      line-height: 1.7; 
      color: var(--text-main);
    }
    .editor-area[placeholder]:empty:before { 
      content: attr(placeholder); 
      color: var(--text-muted); 
      cursor: text; 
    }
    
    /* Submit Button */
    .btn-submit {
      width: 100%; 
      background: linear-gradient(135deg, var(--primary) 0%, #7040e0 100%); 
      color: white; 
      border: none; 
      padding: 16px;
      border-radius: 16px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer;
      transition: all 0.2s; 
      margin-top: 10px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 10px;
      box-shadow: 0 8px 20px rgba(155, 114, 255, 0.2);
    }
    .btn-submit:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 12px 25px rgba(155, 114, 255, 0.3); 
    }
    .btn-submit:disabled { 
      background: #4a4563; 
      color: #8b8d9c;
      cursor: not-allowed; 
      transform: none; 
      box-shadow: none; 
    }
    
    /* Toast Alert */
    .toast {
      position: fixed; 
      bottom: 24px; 
      right: 24px; 
      padding: 16px 24px; 
      border-radius: 12px;
      background: #232336; 
      border: 1px solid #3a3a52;
      color: white; 
      font-size: 14px; 
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
      transform: translateY(100px);
      opacity: 0; 
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #10b981; }
    .toast.error { border-left: 4px solid #ef4444; }
    
    /* Spinner */
    .spinner {
      width: 20px; 
      height: 20px; 
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; 
      border-top-color: white; 
      animation: spin 0.8s linear infinite; 
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Responsive adjustment for Mobile */
    @media (max-width: 600px) {
      .form-row { flex-direction: column; gap: 16px; }
      .title-area h1 { font-size: 32px; }
      .toolbar { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="top-nav">
      <div class="logo-box">W</div>
      <div class="logo-text">SI-WARGA<span>.</span></div>
    </header>

    <div class="title-area">
      <div class="badge"><span class="dot"></span> Arsip Digital 2026</div>
      <h1>Notulen <span class="highlight">Bulanan<br>Warga</span></h1>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="bulan">Bulan Arsip</label>
        <select id="bulan" class="input-control">
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="tahun">Tahun Arsip</label>
        <select id="tahun" class="input-control"></select>
      </div>
    </div>

    <div class="form-group">
      <label>Detail Hasil Rapat</label>
      <div class="word-container">
        <div class="toolbar">
          <button type="button" class="toolbar-btn" onclick="formatDoc('bold')" title="Teks Tebal"><b>B</b></button>
          <button type="button" class="toolbar-btn" onclick="formatDoc('italic')" title="Teks Miring"><i>I</i></button>
          <button type="button" class="toolbar-btn" onclick="formatDoc('underline')" title="Garis Bawah"><u>U</u></button>
          <button type="button" class="toolbar-btn" onclick="formatDoc('strikeThrough')" title="Coret"><s>S</s></button>
          <div class="toolbar-separator"></div>
          <button type="button" class="toolbar-btn" onclick="formatDoc('formatBlock', 'h3')" title="Sub Judul">H</button>
          <button type="button" class="toolbar-btn" onclick="formatDoc('formatBlock', 'p')" title="Paragraf Biasa">P</button>
          <div class="toolbar-separator"></div>
          <button type="button" class="toolbar-btn" onclick="formatDoc('insertUnorderedList')" title="Bullet List">• List</button>
          <button type="button" class="toolbar-btn" onclick="formatDoc('insertOrderedList')" title="Numbered List">1. List</button>
          <div class="toolbar-separator"></div>
          <button type="button" class="toolbar-btn" onclick="formatDoc('removeFormat')" title="Hapus Format" style="color: #ef4444;">Clear</button>
        </div>
        
        <div id="editor" class="editor-area" contenteditable="true" placeholder="Ketik hasil keputusan, kegiatan, atau notes rapat di sini..."></div>
      </div>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="submitNotulen()">
      <span class="spinner" id="btnSpinner"></span>
      <span id="btnText">Simpan ke Arsip Digital</span>
    </button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // URL Web App Apps Script milikmu yang sudah diisi
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9CeqpC3v4t7L_evDI-b4WzyeUS7KM1SsZ5RJFixBoe8edebex4mAhopemje1ujmszhg/exec'; 

    // ---- Script Untuk Mengisi Pilihan Dropdown ----
    const currentYear = new Date().getFullYear();
    const tahunSelect = document.getElementById('tahun');
    for (let i = currentYear - 2; i <= currentYear + 5; i++) {
        let option = document.createElement('option');
        option.value = i;
        option.text = i;
        if (i === currentYear) option.selected = true; 
        tahunSelect.appendChild(option);
    }
    
    const currentMonth = new Date().getMonth(); 
    document.getElementById('bulan').selectedIndex = currentMonth;

    // ---- Script Editor ----
    function formatDoc(cmd, value = null) {
      document.execCommand(cmd, false, value);
      document.getElementById('editor').focus();
    }

    // ---- Script Toast (Notifikasi) ----
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    // ---- Script Pengiriman Data ----
    function submitNotulen() {
      const bulan = document.getElementById('bulan').value;
      const tahun = document.getElementById('tahun').value;
      const content = document.getElementById('editor').innerHTML.trim();
      
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('btnSpinner');
      const btnText = document.getElementById('btnText');
      
      if (!content || content === '<br>' || content === '') {
        showToast('Isi notulennya dulu ya, tidak boleh kosong.', 'error');
        return;
      }

      submitBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Menyimpan...';

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8', 
        },
        body: JSON.stringify({
          bulan: bulan,
          tahun: tahun,
          content: content
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success' || data.result === 'success') {
          showToast('Data berhasil disimpan ke Arsip Digital.', 'success');
          document.getElementById('editor').innerHTML = ''; 
        } else {
          showToast('Terjadi kesalahan: ' + (data.message || 'Error di server.'), 'error');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        showToast('Gagal mengirim data. Pastikan URL Apps Script sudah benar!', 'error');
      })
      .finally(() => {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Simpan ke Arsip Digital';
      });
    }
  </script>
</body>
</html>
