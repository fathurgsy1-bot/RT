<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SI-WARGA 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Arsip Notulen</h1>
        
        <div id="loader" class="text-center py-10">Memuat data...</div>
        
        <div id="data-container" class="space-y-4"></div>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP ANDA
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0GQw-9388iJS_-X10BinXFyfVoT9F2ZTNcjAt1XORUKX3CRktRVpJE5DBZUuqZaHJ/exec';

        async function loadData() {
            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('Gagal akses server');
                const text = await response.text();
                
                renderData(text);
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                document.getElementById('loader').innerHTML = 'Gagal memuat. Pastikan URL Web App benar.';
                console.error(err);
            }
        }

        function renderData(text) {
            const container = document.getElementById('data-container');
            // Logika dasar memecah teks berdasarkan baris baru
            const lines = text.split('\n').filter(line => line.trim() !== '');
            
            container.innerHTML = lines.map(line => `
                <div class="bg-white p-4 rounded shadow border border-gray-100">
                    <p class="text-gray-800">${line}</p>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
