    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0B0E14; 
            color: #9CA3AF;
        }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        details[open] summary ~ * {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        /* Highlight text mark saat pencarian */
        mark {
            background-color: rgba(139, 92, 246, 0.3);
            color: #fff;
            border-radius: 2px;
            padding: 0 2px;
        }
    </style>
</head><body class="antialiased selection:bg-purple-500 selection:text-white">

    

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-lg border-b border-gray-800/60">
<div class="max-w-4xl mx-auto px-4 md:px-8">
<div class="flex justify-between items-center h-20">
<div class="flex items-center space-x-3 cursor-pointer group">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(139,92,246,0.5)] group-hover:shadow-[0_0_25px_rgba(139,92,246,0.7)] transition-all">
W
</div>
<span class="font-bold text-2xl text-white tracking-tight">SI-WARGA<span class="text-purple-500">.</span></span>
</div>
                <div class="hidden md:flex items-center gap-1">
                    <a href="#beranda" class="px-3 py-2 text-white-600 hover:text-emerald-600 rounded-lg transition">Beranda</a>
                    <a href="#data-warga" class="px-3 py-2 text-whitey-600 hover:text-emerald-600 rounded-lg transition">Data</a>
                    
                    <div class="relative group">
                        <button class="flex items-center gap-1 px-3 py-2 text-white-600 hover:text-emerald-600 rounded-lg">
                            Keuangan <i class="fas fa-chevron-down text-[10px] transition-transform group-hover:rotate-180"></i>
                        </button>
                        <div class="absolute left-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                            <a href="#kas-warga" class="white px-4 py-3 text-sm hover:bg-emerald-50">Kas Warga</a>
                            <a href="#tunggakan" class="white px-4 py-3 text-sm hover:bg-red-50">Tunggakan</a>
                        </div>
                    </div>
                    <a href="notulen.html" class="px-3 py-2 text-white-600 hover:text-emerald-600 rounded-lg transition">Notulen</a>

</header>


    <section class="relative pt-16 pb-12 overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute top-0 right-0 w-[300px] h-[300px] bg-blue-600/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="max-w-4xl mx-auto px-4 md:px-8 text-center relative z-10">
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-sm font-medium mb-6">
                <span class="w-2 h-2 rounded-full bg-purple-500 mr-2 animate-pulse"></span>
                Arsip Digital 2026
            </div>
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white mb-6 leading-tight glow-text">
                Notulen <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500">Bulanan Warga</span>
            </h1>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 md:px-8 pb-24 relative z-10">
        
        <div class="mb-8 relative group hidden" id="search-container">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-500 group-focus-within:text-purple-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text" id="search-input" class="w-full bg-[#141824] border border-gray-800/60 text-white rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50 transition-all placeholder-gray-600 shadow-lg" placeholder="Cari keputusan, kegiatan, atau kata kunci lainnya...">
            
            <button id="clear-search" class="absolute inset-y-0 right-0 pr-5 flex items-center text-gray-500 hover:text-white hidden transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div id="display-area" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 space-y-5">
                <div class="relative w-16 h-16">
                    <div class="absolute inset-0 rounded-full border-[3px] border-gray-800"></div>
                    <div class="absolute inset-0 rounded-full border-[3px] border-transparent border-t-purple-500 animate-spin"></div>
                </div>
                <p class="text-purple-400 font-medium animate-pulse tracking-wide">Sinkronisasi Basis Data...</p>
            </div>
        </div>

        <div id="no-results" class="hidden text-center py-16 bg-[#141824] rounded-2xl border border-gray-800/60 mt-4">
            <div class="w-16 h-16 mx-auto bg-gray-800/50 rounded-full flex items-center justify-center text-gray-500 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3 class="text-xl font-medium text-white mb-2">Pencarian Tidak Ditemukan</h3>
            <p class="text-gray-500">Tidak ada notulen yang cocok dengan kata kunci yang Anda cari.</p>
        </div>

    </main>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0GQw-9388iJS_-X10BinXFyfVoT9F2ZTNcjAt1XORUKX3CRktRVpJE5DBZUuqZaHJ/exec';
        let globalData = []; // Menyimpan data murni untuk pencarian

        async function loadData() {
            const displayArea = document.getElementById('display-area');

            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('Gagal terhubung ke server.');
                const text = await response.text();
                
                processData(text, displayArea);
            } catch (err) {
                displayArea.innerHTML = `
                    <div class="bg-[#141824] border border-red-500/20 rounded-2xl p-10 text-center flex flex-col items-center justify-center max-w-lg mx-auto shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-red-500/20 blur-[50px]"></div>
                        <div class="bg-red-500/10 text-red-400 p-4 rounded-full mb-5 border border-red-500/20 relative z-10">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2 relative z-10">Koneksi Terputus</h3>
                        <p class="text-gray-400 mb-6 relative z-10">Sistem gagal mengambil data arsip dari server.</p>
                        <button onclick="location.reload()" class="relative z-10 px-8 py-3 bg-white text-gray-900 font-semibold rounded-full hover:bg-gray-200 transition-colors">
                            Muat Ulang
                        </button>
                    </div>
                `;
            }
        }

        function processData(text, container) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            
            if (lines.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-[#141824] rounded-2xl border border-gray-800">
                        <p class="text-gray-500 text-lg">Direktori kosong. Belum ada arsip yang tercatat.</p>
                    </div>`;
                return;
            }

            let currentGroup = null;

            lines.forEach(line => {
                const trimmedLine = line.trim();
                const isMonthTitle = /^\d+\./.test(trimmedLine) || 
                                     /^(Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember)\s*\d{0,4}$/i.test(trimmedLine);

                if (isMonthTitle) {
                    if (currentGroup) globalData.push(currentGroup);
                    currentGroup = { title: trimmedLine, contents: [] };
                } else {
                    if (currentGroup) {
                        currentGroup.contents.push(trimmedLine);
                    } else {
                        currentGroup = { title: "Arsip Terdahulu", contents: [trimmedLine] };
                    }
                }
            });
            
            if (currentGroup) globalData.push(currentGroup);

            // Tampilkan Search Bar
            document.getElementById('search-container').classList.remove('hidden');
            
            // Render Data Awal
            renderHTML(globalData, container);
            setupSearch(container);
        }

        function renderHTML(dataToRender, container, searchTerm = "") {
            if (dataToRender.length === 0) {
                container.innerHTML = "";
                document.getElementById('no-results').classList.remove('hidden');
                return;
            }
            
            document.getElementById('no-results').classList.add('hidden');

            container.innerHTML = dataToRender.map((group) => {
                // Apakah search term cocok dengan judul bulan?
                const isTitleMatch = searchTerm && group.title.toLowerCase().includes(searchTerm.toLowerCase());
                
                // Render setiap baris
                const contentHtml = group.contents.map(item => {
                    const textContent = item;
                    let displayText = textContent;
                    
                    // Filter Logika
                    const isItemMatch = searchTerm && textContent.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    // Jika ada kata pencarian dan cocok, beri highlight
                    if (isItemMatch) {
                        const regex = new RegExp(`(${searchTerm})`, 'gi');
                        displayText = textContent.replace(regex, '<mark>$1</mark>');
                    }

                    // Tampilkan <li> jika cocok dengan pencarian, atau jika judul bulannya cocok, atau jika tidak ada pencarian
                    const showItem = searchTerm === "" || isItemMatch || isTitleMatch;

                    if (!showItem) return '';

                    return `
                        <li class="relative pl-8 py-3 text-gray-300 leading-relaxed group/item border-b border-gray-800/50 last:border-0 hover:text-white transition-colors">
                            <span class="absolute left-0 top-[16px] text-purple-500 group-hover/item:translate-x-1 transition-transform">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </span>
                            ${displayText}
                        </li>
                    `;
                }).join('');

                // Tentukan apakah dropdown terbuka secara otomatis (buka jika sedang mencari sesuatu)
                const isOpen = searchTerm !== "" ? "open" : "";

                return `
                    <details ${isOpen} class="group bg-[#141824] rounded-2xl border border-gray-800/60 mb-5 hover:border-purple-500/30 transition-colors duration-300 overflow-hidden">
                        <summary class="flex justify-between items-center p-6 cursor-pointer select-none bg-[#141824] group-hover:bg-[#1A1E2B] transition-colors">
                            <div class="flex items-center space-x-5">
                                <div class="w-12 h-12 rounded-xl bg-gray-800/50 text-gray-400 border border-gray-700/50 flex items-center justify-center group-open:bg-purple-500/10 group-open:text-purple-400 group-open:border-purple-500/30 transition-all duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                    </svg>
                                </div>
                                <span class="text-white font-semibold text-lg md:text-xl capitalize tracking-wide group-open:text-transparent group-open:bg-clip-text group-open:bg-gradient-to-r group-open:from-indigo-400 group-open:to-purple-400 transition-all">${group.title}</span>
                            </div>
                            <div class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800/50 text-gray-400 group-open:bg-purple-500 group-open:text-white group-open:rotate-180 transition-all duration-500 shadow-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>
                        </summary>
                        
                        <div class="px-6 md:px-20 pb-8 pt-2">
                            <ul class="space-y-1">
                                ${contentHtml}
                            </ul>
                        </div>
                    </details>
                `;
            }).join('');
        }

        function setupSearch(container) {
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.trim();
                
                // Munculkan tombol silang jika ada teks
                if(term.length > 0) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }

                // Filter Data
                const filteredData = globalData.filter(group => {
                    const titleMatch = group.title.toLowerCase().includes(term.toLowerCase());
                    const contentsMatch = group.contents.some(item => item.toLowerCase().includes(term.toLowerCase()));
                    return titleMatch || contentsMatch;
                });

                renderHTML(filteredData, container, term);
            });

            // Logika tombol silang (clear)
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.add('hidden');
                renderHTML(globalData, container, "");
                searchInput.focus();
            });
        }

        loadData();
    </script>
</body>
