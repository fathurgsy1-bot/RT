<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

                <span class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2 py-0.5 rounded">RT. 04 - RW. 26</span>
            </div>
            <div class="flex flex-wrap justify-center gap-4 md:gap-6 font-medium text-sm">

    <header class="pt-32 pb-16 bg-emerald-900 text-white rounded-b-[3rem]">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <div class="inline-block p-3 bg-emerald-800 rounded-2xl mb-4 text-emerald-300">
                <i class="fas fa-book-open text-3xl"></i>
            </div>
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Arsip Notulen Rapat</h2>
            <p class="text-emerald-200 text-lg max-w-2xl mx-auto">Catatan hasil pertemuan dan keputusan warga yang diperbarui secara otomatis dari arsip Google Docs.</p>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-6 -mt-8 relative z-10 pb-24 flex-1 w-full">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-8 flex items-center gap-3">
            <i class="fas fa-search text-gray-400 pl-2"></i>
            <input type="text" id="search-notulen" placeholder="Cari notulen berdasarkan bulan (misal: Juni)..." class="w-full bg-transparent border-none focus:outline-none text-sm" onkeyup="filterNotulen()">
            <button onclick="fetchNotulen()" class="bg-emerald-100 text-emerald-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-200 transition whitespace-nowrap">
                <i class="fas fa-sync-alt mr-1"></i> Refresh
            </button>
        </div>

        <div id="loader-notulen" class="flex flex-col items-center justify-center py-16 bg-white rounded-3xl shadow-xl border border-gray-100">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-emerald-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-500 font-medium animate-pulse">Sinkronisasi data dari dokumen...</p>
        </div>

        <div class="space-y-4" id="accordion-container" style="display: none;">
        </div>
    </section>

    <footer class="bg-gray-900 text-gray-400 py-6 md:py-8 border-t border-gray-800 text-center text-xs md:text-sm mt-auto">
        <p>&copy; 2026 RT 04 RW 26 Meteseh, Tembalang, Kota Semarang.</p>
    </footer>

       <script>
        // Google Doc ID
        const docId = '1-iCZxa5gO_akITHhmEBM7cBYrT4xQMuDZ7qe0saG5z4';
        const docUrl = `https://docs.google.com/document/d/${docId}/export?format=txt`;
        
        // Perbaikan 1: Menggunakan AllOrigins yang umumnya lebih stabil daripada corsproxy.io
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(docUrl)}`;

        let allNotulen = [];

        async function fetchNotulen() {
            const loader = document.getElementById('loader-notulen');
            const container = document.getElementById('accordion-container');
            
            loader.style.display = 'flex';
            container.style.display = 'none';

            try {
                const response = await fetch(proxyUrl, { cache: "no-store" });
                if (!response.ok) throw new Error("Gagal mengambil data doc");
                
                const text = await response.text();
                
                // Perbaikan 2: Validasi pencegahan error jika dokumen disetel ke 'Private'
                // Jika private, Google akan merespons dengan HTML halaman login, bukan teks notulen.
                if (text.trim().toLowerCase().startsWith('<!doctype html>') || text.includes('<html')) {
                    throw new Error("Akses ditolak. Dokumen tidak bersifat publik.");
                }

                parseAndRenderNotulen(text);
                
                loader.style.display = 'none';
                container.style.display = 'block';
            } catch (error) {
                console.error('Error fetching doc:', error);
                loader.innerHTML = `
                    <div class="text-red-500 text-4xl mb-3"><i class="fas fa-exclamation-triangle"></i></div>
                    <p class="text-gray-700 font-bold">Gagal memuat notulen.</p>
                    <p class="text-sm text-gray-500 text-center max-w-sm mt-2">Pastikan pengaturan dokumen Google Doc diatur ke <strong>"Siapa saja yang memiliki link"</strong>.</p>
                    <button onclick="fetchNotulen()" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">Coba Lagi</button>
                `;
            }
        }

        function parseAndRenderNotulen(text) {
            // Regex mencari pola awalan nomor dan bulan. (Contoh: "1.  Juni 2026")
            const regex = /^(\d+)\.\s+(.+)$/gm;
            
            let match;
            let sections = [];
            let lastIndex = 0;
            
            while ((match = regex.exec(text)) !== null) {
                if (sections.length > 0) {
                    sections[sections.length - 1].content = text.substring(lastIndex, match.index).trim();
                }
                
                sections.push({
                    id: match[1],
                    title: match[2].trim(),
                    content: ''
                });
                lastIndex = regex.lastIndex;
            }
            
            if (sections.length > 0) {
                 sections[sections.length - 1].content = text.substring(lastIndex).trim();
            }

            if (sections.length === 0) {
                sections.push({
                    id: "1",
                    title: "Catatan Tunggal",
                    content: text.trim() || "Dokumen belum memiliki catatan apa pun."
                });
            }

            allNotulen = sections;
            renderAccordion(sections);
        }

        function formatContent(rawContent) {
            return rawContent.split('\n')
                .map(line => line.trim())
                .filter(line => line !== '')
                .map(line => {
                    if (line.includes(':')) {
                        const idx = line.indexOf(':');
                        const prefix = line.substring(0, idx + 1);
                        const suffix = line.substring(idx + 1);
                        return `<p class="mb-3 text-gray-700 leading-relaxed"><strong class="text-gray-900">${prefix}</strong>${suffix}</p>`;
                    }
                    return `<p class="mb-3 text-gray-700 leading-relaxed">${line}</p>`;
                })
                .join('');
        }

        function renderAccordion(sections) {
            const container = document.getElementById('accordion-container');
            
            if (sections.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-10">Belum ada data notulen.</p>';
                return;
            }
            
            let html = '';
            const sortedSections = [...sections].reverse(); 
            
            sortedSections.forEach((sec, index) => {
                const isFirst = index === 0; 
                const contentHtml = formatContent(sec.content);
                
                html += `
                <div class="notulen-item bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" data-title="${sec.title.toLowerCase()}">
                    <button onclick="toggleNotulen('notulen-${sec.id}')" class="w-full p-5 flex justify-between items-center bg-gray-50 hover:bg-emerald-50 transition-colors text-left group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-lg group-hover:scale-110 transition-transform">
                                ${sec.id}
                            </div>
                            <span class="font-bold text-lg text-gray-800">${sec.title}</span>
                        </div>
                        <i id="icon-notulen-${sec.id}" class="fas fa-chevron-${isFirst ? 'up' : 'down'} text-gray-400 transition-transform duration-300"></i>
                    </button>
                    <div id="notulen-${sec.id}" class="p-6 border-t border-gray-100 ${isFirst ? '' : 'hidden'} bg-white">
                        <div class="prose prose-emerald max-w-none text-sm md:text-base">
                            ${contentHtml}
                        </div>
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function toggleNotulen(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById('icon-' + id.replace('notulen-', ''));
            
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            } else {
                el.classList.add('hidden');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            }
        }

        function filterNotulen() {
            const query = document.getElementById('search-notulen').value.toLowerCase();
            const items = document.querySelectorAll('.notulen-item');
            
            items.forEach(item => {
                const title = item.getAttribute('data-title');
                if (title.includes(query)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', fetchNotulen);
    </script>
</body>
