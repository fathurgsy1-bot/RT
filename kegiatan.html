<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Kegiatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Data Kegiatan</h2>
    <a href="https://script.google.com/macros/s/AKfycbxKwWu0g7nOvFlMpNTc8VMoipGsI_77_fBu198JcqHhlauoNCFCbBsmVo9fRzIwlETp/exec" 
   class="btn btn-primary" target="_blank">
   + Tambah Kegiatan
</a>

  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>No</th>
              <th>Nama Kegiatan</th>
              <th>Tanggal</th>
              <th>Status</th>
              <th class="text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-body">
            <tr>
              <td colspan="5" class="text-center text-muted">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalDetail" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalDetailLabel">Detail Kegiatan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <table class="table table-borderless">
          <tr>
            <td width="35%"><strong>Nama Kegiatan</strong></td>
            <td width="5%">:</td>
            <td id="detail-nama">-</td>
          </tr>
          <tr>
            <td><strong>Tanggal</strong></td>
            <td>:</td>
            <td id="detail-tanggal">-</td>
          </tr>
          <tr>
            <td><strong>Status</strong></td>
            <td>:</td>
            <td id="detail-status">-</td>
          </tr>
          <tr>
            <td><strong>Keterangan Tambahan</strong></td>
            <td>:</td>
            <td id="detail-keterangan">-</td>
          </tr>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // URL Spreadsheet Anda: https://docs.google.com/spreadsheets/d/1-Zr-Y2oEX5a38rNGv0Zml_qwcQv3sV0t8ltnDnRLT1o/edit
  // Catatan: Untuk menarik data langsung dari JS ke Spreadsheet, Anda biasanya membutuhkan endpoint Google Apps Script 
  // yang mengembalikan JSON. Di bawah ini adalah simulasi (dummy data) bagaimana data dirender.

  const dummyData = [
    { id: 1, nama: "Rapat Paripurna", tanggal: "2023-10-15", status: "Selesai", keterangan: "Rapat berjalan lancar dan semua hadir." },
    { id: 2, nama: "Kunjungan Lapangan", tanggal: "2023-10-20", status: "Berjalan", keterangan: "Tim sedang meninjau lokasi proyek." }
  ];

  function renderTable(data) {
    const tbody = document.getElementById('tabel-body');
    tbody.innerHTML = ''; // Kosongkan state loading

    data.forEach((item, index) => {
      const row = `
        <tr>
          <td>${index + 1}</td>
          <td>${item.nama}</td>
          <td>${item.tanggal}</td>
          <td><span class="badge ${item.status === 'Selesai' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
          <td class="text-center">
            <button class="btn btn-sm btn-info text-white" onclick='showDetail(${JSON.stringify(item)})'>Lihat Detail</button>
          </td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
  }

  // Fungsi untuk menampilkan data ke dalam Modal
  function showDetail(item) {
    document.getElementById('detail-nama').innerText = item.nama;
    document.getElementById('detail-tanggal').innerText = item.tanggal;
    document.getElementById('detail-status').innerText = item.status;
    document.getElementById('detail-keterangan').innerText = item.keterangan;
    
    // Tampilkan Modal
    const modal = new bootstrap.Modal(document.getElementById('modalDetail'));
    modal.show();
  }

  // Menjalankan fungsi render setelah halaman dimuat (Simulasi Fetch API)
  window.onload = () => {
    // Jika Anda punya link Apps Script (GET method) untuk ambil data, ganti baris ini dengan fetch('URL_API_ANDA')
    renderTable(dummyData); 
  };
</script>

</body>
</html>
