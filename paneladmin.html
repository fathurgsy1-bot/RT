<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sistem Arsip & Simpan Pinjam</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        :root {
            --primary: #4e73df;
            --primary-dark: #2e59d9;
            --sidebar-bg: #4e73df;
            --bg-light: #f8f9fc;
            --text-dark: #5a5c69;
            --text-gray: #858796;
            --border: #e3e6f0;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* ================= LOGIN PANEL ================= */
        .login-wrapper {
            background: var(--primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #fff;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .login-card .icon-logo {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #3a3b45;
            margin-bottom: 0.2rem;
        }

        .login-card p {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #3a3b45;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d3e2;
            border-radius: 8px;
            color: #6e707e;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #bac8f3;
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        .notification {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            display: none;
        }
        .notification.success {
            background: #1cc88a;
            color: #fff;
            display: block;
        }
        .notification.error {
            background: #e74a3b;
            color: #fff;
            display: block;
        }

        /* ================= ADMIN INTERFACE ================= */
        .admin-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
            background: var(--bg-light);
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            background-image: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 85px;
        }

        .sidebar-brand {
            height: 4.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            white-space: nowrap;
        }

        .sidebar-brand i {
            font-size: 1.6rem;
            margin-right: 10px;
        }

        .sidebar.collapsed .sidebar-brand .brand-text {
            display: none;
        }

        .sidebar.collapsed .sidebar-brand i {
            margin-right: 0;
        }

        .menu {
            list-style: none;
            padding: 1rem 0;
            overflow-y: auto;
        }

        .menu::-webkit-scrollbar { width: 5px; }
        .menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }

        .menu li {
            padding: 0 1rem;
            margin-bottom: 5px;
        }

        .menu a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            padding: 14px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .menu a i.nav-icon {
            font-size: 1.1rem;
            width: 25px;
            text-align: center;
            margin-right: 12px;
        }

        .sidebar.collapsed .menu a {
            justify-content: center;
        }

        .sidebar.collapsed .menu a span {
            display: none;
        }

        .sidebar.collapsed .menu a i.nav-icon {
            margin-right: 0;
            font-size: 1.2rem;
        }

        .menu a:hover, .menu a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }

        /* CONTENT AREA */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TOPBAR */
        .topbar {
            height: 4.375rem;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            z-index: 10;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: var(--primary-dark);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-gray);
        }

        .btn-logout {
            background: #fff;
            border: 1px solid #e74a3b;
            color: #e74a3b;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-logout:hover {
            background: #e74a3b;
            color: #fff;
        }

        /* MAIN CONTENT */
        .main-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .content-header {
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .content-header h1 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--text-dark);
        }

        .badge-url {
            font-size: 0.75rem;
            background: #eaecf4;
            color: var(--text-gray);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #d1d3e2;
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .iframe-container {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100vh;
                left: -250px;
                box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            }
            .sidebar.mobile-open {
                left: 0;
            }
            .user-info {
                display: none;
            }
            .content-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .badge-url {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="auth-panel" class="login-wrapper">
        <div class="login-card">
            <i class="fas fa-archive icon-logo"></i>
            <h1>E-Sistem Arsip</h1>
            <p>Panel Admin RT 4 RW 26</p>

            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-identifier">Username</label>
                    <input type="text" id="login-identifier" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Login Panel</button>
            </form>

            <div id="status-notif" class="notification"></div>
        </div>
    </div>


    <div id="admin-panel" class="admin-wrapper hidden">
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-book-open"></i>
                <span class="brand-text">SIMPAN PINJAM</span>
            </div>
            <ul class="menu">
                <li><a href="#" onclick="loadContent(this, '💸 Laporan Kas', 'https://rt04rw26.vercel.app/dataangsuran.html')" class="active"><i class="fas fa-money-bill-wave nav-icon"></i><span>Angsuran Kas</span></a></li>
                <li><a href="#" onclick="loadContent(this, '📉 Tunggakan Warga', 'https://wikipedia.org')"><i class="fas fa-chart-line nav-icon"></i><span>Tunggakan</span></a></li>
                <li><a href="#" onclick="loadContent(this, '👥 Data Seluruh Warga', 'https://example.com')"><i class="fas fa-users nav-icon"></i><span>Data Warga</span></a></li>
                <li><a href="#" onclick="loadContent(this, '📅 Jadwal Kegiatan', 'https://example.com')"><i class="fas fa-calendar-alt nav-icon"></i><span>Kegiatan</span></a></li>
                <li><a href="#" onclick="loadContent(this, '💌 Undangan Digital', 'undangan.html')"><i class="fas fa-envelope-open-text nav-icon"></i><span>Undangan</span></a></li>
                <li><a href="#" onclick="loadContent(this, '📥 Laporan Surat Masuk', 'https://example.com')"><i class="fas fa-inbox nav-icon"></i><span>Lap. Srt Masuk</span></a></li>
                <li><a href="#" onclick="loadContent(this, '📤 Laporan Surat Keluar', 'https://example.com')"><i class="fas fa-paper-plane nav-icon"></i><span>Lap. Srt Keluar</span></a></li>
                <li><a href="#" onclick="loadContent(this, '📊 Laporan Warga', 'https://script.google.com/macros/s/AKfycbxKwWu0g7nOvFlMpNTc8VMoipGsI_77_fBu198JcqHhlauoNCFCbBsmVo9fRzIwlETp/exec')"><i class="fas fa-chart-bar nav-icon"></i><span>Kegiatan Warga</span></a></li>
            </ul>
        </div>

        <div class="content-wrapper">
            
            <nav class="topbar">
                <button class="toggle-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-right">
                    <span class="user-info">Halo, Admin RT 4</span>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Keluar
                    </button>
                </div>
            </nav>

            <div class="main-content">
                <div class="content-header">
                    <h1 id="content-title">💸 Laporan Kas</h1>
                    <div id="content-url-badge" class="badge-url">Source: https://rt04rw26.vercel.app/dataangsuran.html</div>
                </div>
                <div class="iframe-container">
                    <iframe id="app-frame" src="https://rt04rw26.vercel.app/dataangsuran.html"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SESSION_KEY = 'rt4rw26_admin_session';
        const SESSION_EXPIRY_MS = 24 * 60 * 60 * 1000; // 1 Hari

        // CEK SESSION BROWSER DIBUKA
        document.addEventListener('DOMContentLoaded', () => {
            const sessionData = localStorage.getItem(SESSION_KEY);
            
            if (sessionData) {
                const sessionTime = parseInt(sessionData, 10);
                const currentTime = new Date().getTime();

                if (currentTime - sessionTime < SESSION_EXPIRY_MS) {
                    enterAdminPanel();
                } else {
                    localStorage.removeItem(SESSION_KEY);
                }
            }
        });

        // FUNGSI TOGGLE SIDEBAR (Responsive)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // FUNGSI LOAD KONTEN IFRAME
        function loadContent(element, title, url) {
            const menus = document.querySelectorAll('.menu a');
            menus.forEach(menu => menu.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('content-title').innerText = title;
            document.getElementById('content-url-badge').innerText = `Source: ${url}`;

            const iframe = document.getElementById('app-frame');
            iframe.src = url;
            
            // Tutup sidebar di versi mobile setelah menu diklik
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('mobile-open');
            }
        }

        // FUNGSI NOTIFIKASI
        function showNotification(text, type) {
            const notif = document.getElementById('status-notif');
            notif.innerText = text;
            notif.className = `notification ${type}`;
        }

        // FUNGSI LOGIN
        function handleLogin(event) {
            event.preventDefault();
            const identifier = document.getElementById('login-identifier').value;
            const password = document.getElementById('login-password').value;

            // HARDCODE LOGIN (rt4rw26 / rt4rw26)
            if (identifier === "rt4rw26" && password === "rt4rw26") {
                showNotification("Akses Diterima! Memuat Dashboard...", "success");
                localStorage.setItem(SESSION_KEY, new Date().getTime().toString());
                setTimeout(() => enterAdminPanel(), 1000);
            } else {
                showNotification("Akses Ditolak: Username atau Password salah!", "error");
            }
        }

        // MENGUBAH TAMPILAN KE ADMIN
        function enterAdminPanel() {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        // FUNGSI LOGOUT
        function logout() {
            localStorage.removeItem(SESSION_KEY);
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('auth-panel').classList.remove('hidden');
            document.getElementById('form-login').reset();
            document.getElementById('status-notif').className = 'notification';
            
            // Reset Sidebar untuk sesi selanjutnya
            document.getElementById('sidebar').classList.remove('mobile-open');
        }
    </script>
</body>
</html>
